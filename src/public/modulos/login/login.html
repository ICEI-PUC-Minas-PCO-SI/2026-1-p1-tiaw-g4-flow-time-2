<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Time - Login</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div class="app-container" style="justify-content: center; align-items: center; padding: 30px;">
        
        <div id="tela-login" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <img src="../../assets/images/logo.png" class="logo-majestosa" style="width: 140px; height: 140px; margin-bottom: 25px;" alt="Logo Flow Time">
            
            <h2 style="color: var(--azul-escuro); margin-bottom: 25px; font-size: 22px;">Bem-vindo de volta!</h2>
            
            <div class="caixa-login">
                <input type="email" id="loginEmail" placeholder="Seu e-mail..." class="input-login">
            </div>
            
            <div class="caixa-login" style="margin-bottom: 30px;">
                <input type="password" id="loginSenha" placeholder="Sua senha..." class="input-login">
            </div>

            <button class="botao-agendar" onclick="fazerLogin()">ENTRAR</button>
            
            <p style="margin-top: 25px; font-size: 14px; color: var(--azul-medio); font-weight: bold; cursor: pointer;" onclick="alternarTelas('tela-registro')">Novo por aqui? Criar conta</p>
        </div>

        <div id="tela-registro" style="width: 100%; display: none; flex-direction: column; align-items: center;">
            <h2 style="color: var(--azul-escuro); margin-bottom: 25px; font-size: 22px;">Criar Conta</h2>
            
            <div class="caixa-login">
                <input type="text" id="regNome" placeholder="Nome Completo" class="input-login">
            </div>
            
            <div class="caixa-login">
                <input type="email" id="regEmail" placeholder="E-mail" class="input-login">
            </div>
            
            <div class="caixa-login">
                <input type="password" id="regSenha" placeholder="Senha" class="input-login">
            </div>
            <div class="caixa-login" style="margin-bottom: 30px;">
                <input type="password" id="regSenhaConfirma" placeholder="Confirmar Senha" class="input-login">
            </div>

            <button class="botao-agendar" onclick="registrarUsuario()">CADASTRAR</button>
            
            <p style="margin-top: 25px; font-size: 14px; color: var(--azul-medio); font-weight: bold; cursor: pointer;" onclick="alternarTelas('tela-login')">Voltar para o Login</p>
        </div>

    </div>
    <script src="../../assets/js/login.js"></script>
</body>
</html>
