<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Método Pomodoro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <div class="header">
        <img src="Img/menu.png" class="icon">
        <img src="Img/pomodoro.png" class="logo">
        <img src="Img/perfil.png" class="icon">
    </div>
  <h1>Método Pomodoro</h1>

  <div class="timer-container">
    
<svg class="progress-ring" width="260" height="260">

  <defs>
    <linearGradient id="gradiente"  x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1b6a82" />
      <stop offset="100%" stop-color="#41d09a" />
    </linearGradient>
  </defs>

  <circle class="bg" cx="130" cy="130" r="120"></circle>
  <circle class="progress" cx="130" cy="130" r="120"></circle>

</svg>

    <div class="timer-text" id="timer">25:00</div>

  </div>

  <button class="btn-start" onclick="iniciar()">
  <img src="Img/play.png" class="btn-icon">
  COMEÇAR
</button>

 <div class="controls">
  <button onclick="pausar()">
    <img src="Img/pausar.png" class="btn-icon">
    Pausar
  </button>
  <button onclick="pular()">
    <img src="Img/pular.png" class="btn-icon">
    Pular
  </button>
</div>

<div class="footer">
  Frase motivacional...
</div>

</div>

<script src="script.js"></script>

</body>
</html>
