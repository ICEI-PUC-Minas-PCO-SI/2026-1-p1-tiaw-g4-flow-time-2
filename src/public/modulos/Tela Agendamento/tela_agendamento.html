<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>
    <link rel="stylesheet" href="estilo_agendamento.css">
</head>
<body>
    <header>
        <img src="img/menu.png" class="icon" alt="Menu">
        <img src="img/agendar.png" class="icon-meio" alt="Agendar">
        <img src="img/perfil.png" class="icon" alt="Perfil">
    </header>

    <div class="faixa_titulo">
        <p>AGENDAR TAREFAS</p>
    </div>

    <main>
        <div class="bloco caixa-entrada">
            <span class="mais">+</span>
            <input type="text" placeholder="Nome da Tarefa..." class="campo-tarefa">
        </div>
        
        <div class="bloco linha-data-hora">
            <div class="caixa-data-hora">
                <p>DATA</p>
                <input type="text" placeholder="00/00/0000" class="input-transparente" oninput="mascaraData(this)">
            </div>
            <div class="caixa-data-hora">
                <p>HORA</p>
                <input type="text" placeholder="00:00" class="input-transparente" oninput="mascaraHora(this)">
            </div>
        </div>
        
        <div class="bloco caixa-repeticao" id="caixa-semanal" onclick="alternarCheckbox('semanal')">
            <div class="linha-checkbox">
                <img src="img/emptybox.png" class="icon-check" id="icone-semanal" alt="Desmarcado">
                <p class="texto-checkbox">Repetir semanalmente</p>
            </div>
        </div>

        <div class="bloco caixa-repeticao" id="caixa-mensal" onclick="alternarCheckbox('mensal')">
            <div class="linha-checkbox">
                <img src="img/emptybox.png" class="icon-check" id="icone-mensal" alt="Desmarcado">
                <p class="texto-checkbox">Repetir mensalmente</p>
            </div>
        </div>

        <div class="bloco linha-selects">
            <select id="categoria" class="caixa-select">
                <option value="" disabled selected>Categoria</option>
                <option value="1">Trabalho</option>
                <option value="2">Estudos</option>
                <option value="3">Saúde</option>
                <option value="4">Lazer</option>
                <option value="5">Outros</option>
            </select>

            <select id="prioridade" class="caixa-select">
                <option value="" disabled selected>Prioridade</option>
                <option value="1">Alta</option>
                <option value="2">Média</option>
                <option value="3">Baixa</option>
            </select>
        </div>

        <div class="bloco centralizar-botao">
            <button class="botao-agendar" onclick="salvarAgendamento()">AGENDAR</button>
        </div>
    </main>
    
    <footer>
        <p>[Frase motivacional]</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
