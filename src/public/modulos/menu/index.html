<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Time - Início</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

    <div class="app-container">
        
        <header class="header-global">
            <img src="../../assets/images/menu.png" class="icon-btn" alt="Menu">
            <span class="titulo-header">FLOW TIME</span>
            <img src="../../assets/images/perfil.png" class="icon-btn" alt="Perfil">
        </header>

        <div class="faixa-cumprimento">
            Olá, Marcos! Que seu dia seja super produtivo.
        </div>

        <div class="home-logo-central">
            <img src="../../assets/images/logo.png" class="logo-majestosa" alt="Logo Flow Time">
            <p>O que vamos focar hoje?</p>
        </div>

        <main class="grid-wireframe-home">
            
            <div class="card-botao-home" onclick="window.location.href='../calendario/calendario.html'">
                <img src="../../assets/images/calendario.png" alt="Calendário">
                <p>CALENDÁRIO</p>
            </div>

            <div class="card-botao-home" onclick="window.location.href='../agendamento/agendamento.html'">
                <img src="../../assets/images/agendar.png" alt="Agendar">
                <p>AGENDAR TAREFAS</p>
            </div>

            <div class="card-botao-home card-pomodoro-destaque" onclick="window.location.href='../pomodoro/pomodoro.html'">
                <img src="../../assets/images/pomodoro.png" alt="Pomodoro">
                <p>MÉTODO POMODORO</p>
            </div>

        </main>

        <footer class="rodape-motivacional-home">
            <p id="fraseMotivacionalHome">"A disciplina é a ponte entre metas e realizações."</p>
        </footer>

    </div>

    <script src="../../assets/js/script.js"></script>
    <script src="../../assets/js/seed.js"></script>
</body>
</html>
